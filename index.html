<script>

// ===============================
// FAKE WEBSITE DATABASE
// ===============================

const fakeWebsites = [

    "nios-ac.in",
    "old-nios-ac.in",
    "www.nios.gen.in",
    "east.dpsbangalore.edu.in/nios-admissions",
    "nios.ac.in-examresult.in",
    "www.bholananda.org/national_institute_of_open_schooling_nios"

];


// ===============================
// FAKE MOBILE APPS DATABASE
// ===============================

const fakeApps = [

    "nios the s g network",
    "nios study material devilsgroup",
    "nios study material hindihelp group",
    "nios books supercop",
    "nios all books mukesh kaushik"

];


// ===============================
// URL DETECTION
// ===============================

function scanURL(){

    let urlInput =
        document.getElementById("urlInput");

    let url =
        urlInput.value
        .trim()
        .toLowerCase();

    let result =
        document.getElementById("urlResult");

    result.style.display = "block";



    // Empty Input

    if(url === ""){

        result.className =
            "result warning";

        result.innerHTML =
            "⚠ Please enter a URL.";

        return;
    }



    // Invalid Format

    if(
        !url.startsWith("http://") &&
        !url.startsWith("https://")
    ){

        result.className =
            "result warning";

        result.innerHTML =
            "⚠ Invalid URL format.";

        return;
    }



    // Suspicious Patterns

    let suspiciousPatterns = [

        "bit.ly",
        "tinyurl",
        "rb.gy",
        "goo.gl",
        "rebrand.ly",
        "t.co",

        "login",
        "verify",
        "secure",
        "bank",
        "paypal",
        "gift",
        "bonus",
        "free",

        "@",
        ".xyz",
        ".ru",
        ".top"

    ];



    let malicious = false;



    // Check fake database

    for(let fake of fakeWebsites){

        if(url.includes(fake)){

            malicious = true;

            result.className =
                "result danger";

            result.innerHTML =
                "⚠ Fake Website Detected";

            return;
        }
    }



    // Check suspicious patterns

    for(let pattern of suspiciousPatterns){

        if(url.includes(pattern)){

            malicious = true;
            break;
        }
    }



    // Final Result

    if(malicious){

        result.className =
            "result danger";

        result.innerHTML =
            "⚠ Suspicious / Phishing URL Detected";

    }

    else{

        result.className =
            "result safe";

        result.innerHTML =
            `
            ✅ Safe Website <br><br>

            Redirecting...
            `;



        // OPEN SAFE WEBSITE

        setTimeout(() => {

            window.open(url, "_blank");

        }, 2000);
    }
}



// ===============================
// FILE & APP DETECTION
// ===============================

function scanFile(){

    let fileInput =
        document.getElementById("fileInput");

    let result =
        document.getElementById("fileResult");

    result.style.display = "block";



    if(fileInput.files.length === 0){

        result.className =
            "result warning";

        result.innerHTML =
            "⚠ Please upload a file.";

        return;
    }



    let file =
        fileInput.files[0];

    let fileName =
        file.name.toLowerCase();



    let malicious = false;



    // Fake PDF Detection

    if(
        fileName.includes(".pdf.exe") ||
        fileName.includes(".pdf.js") ||
        fileName.includes(".pdf.apk")
    ){

        malicious = true;
    }



    // Dangerous Extensions

    let dangerousExtensions = [

        ".exe",
        ".bat",
        ".scr",
        ".js",
        ".vbs"

    ];



    for(let ext of dangerousExtensions){

        if(fileName.endsWith(ext)){

            malicious = true;
            break;
        }
    }



    // APK Detection

    if(fileName.endsWith(".apk")){

        malicious = true;
    }



    // Fake App Detection

    for(let app of fakeApps){

        if(fileName.includes(app)){

            malicious = true;

            result.className =
                "result danger";

            result.innerHTML =
                "⚠ Fake NIOS App Detected";

            return;
        }
    }



    // Suspicious Keywords

    let suspiciousWords = [

        "hack",
        "crack",
        "mod",
        "premium",
        "virus",
        "trojan",
        "malware",
        "keylogger"

    ];



    for(let word of suspiciousWords){

        if(fileName.includes(word)){

            malicious = true;
            break;
        }
    }



    // Final Result

    if(malicious){

        result.className =
            "result danger";

        result.innerHTML =
            "⚠ Harmful File / 3rd Party App Detected";

    }

    else{

        result.className =
            "result safe";

        result.innerHTML =
            "✅ File Looks Safe";
    }
}

</script>
