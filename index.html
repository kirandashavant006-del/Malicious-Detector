<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phishing URL Detector</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#000;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:850px;
    background:#111;
    padding:40px;
    border-radius:20px;
    box-shadow:0 0 25px rgba(0,255,120,0.2);
}

h1{
    text-align:center;
    color:#00ff88;
    margin-bottom:10px;
    font-size:42px;
}

.subtitle{
    text-align:center;
    color:#aaa;
    margin-bottom:35px;
}

.card{
    background:#1b1b1b;
    border:1px solid #2a2a2a;
    padding:25px;
    border-radius:15px;
}

h2{
    color:#00ff88;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:15px;
    background:#222;
    border:none;
    border-radius:10px;
    color:white;
    font-size:16px;
    margin-bottom:20px;
    outline:none;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#00ff88;
    color:black;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#00cc66;
    transform:scale(1.02);
}

.result{
    margin-top:25px;
    padding:18px;
    border-radius:10px;
    text-align:center;
    font-size:18px;
    font-weight:bold;
    display:none;
}

.safe{
    background:#003d20;
    color:#00ff88;
}

.danger{
    background:#4d0000;
    color:#ff4d4d;
}

.warning{
    background:#4d3300;
    color:#ffcc66;
}

.info{
    margin-top:30px;
    color:#999;
    line-height:1.8;
}

.info ul{
    margin-top:10px;
    padding-left:20px;
}

footer{
    margin-top:30px;
    text-align:center;
    color:#666;
}

</style>
</head>
<body>

<div class="container">

    <h1>⚠ Phishing URL Detector</h1>

    <p class="subtitle">
        Detect fake URLs, phishing websites & suspicious shortened links instantly.
    </p>

    <div class="card">

        <h2>🔗 URL Scanner</h2>

        <input
            type="text"
            id="urlInput"
            placeholder="Enter suspicious URL..."
        >

        <button onclick="scanURL()">
            Scan URL
        </button>

        <div id="result" class="result"></div>

        <div class="info">

            <strong>Detects:</strong>

            <ul>
                <li>Bitly & shortened URLs</li>
                <li>Fake login pages</li>
                <li>Bank phishing links</li>
                <li>Password stealing URLs</li>
                <li>Suspicious domains</li>
            </ul>

        </div>

    </div>

    <footer>
        Cyber Security Mini Project
    </footer>

</div>

<script>

function scanURL(){

    let url =
        document.getElementById("urlInput")
        .value
        .trim()
        .toLowerCase();

    let result =
        document.getElementById("result");

    result.style.display = "block";

    // Empty Input Check
    if(url === ""){

        result.className = "result warning";

        result.innerHTML =
            "⚠ Please enter a URL first.";

        return;
    }

    // Suspicious Patterns
    let suspiciousPatterns = [

        "bit.ly",
        "tinyurl",
        "rb.gy",
        "goo.gl",
        "rebrand.ly",
        "t.co",

        "login",
        "verify",
        "secure",
        "bank",
        "paypal",
        "bonus",
        "gift",
        "free",
        "confirm",
        "update-password",
        "confirm-account",

        "@",
        "//http",
        ".xyz",
        ".top",
        ".ru"

    ];

    let malicious = false;

    for(let pattern of suspiciousPatterns){

        if(url.includes(pattern)){

            malicious = true;
            break;
        }
    }

    // Invalid URL Format
    if(
        !url.startsWith("http://") &&
        !url.startsWith("https://")
    ){

        result.className = "result warning";

        result.innerHTML =
            "⚠ Invalid URL format. Use http:// or https://";

        return;
    }

    // Final Detection
    if(malicious){

        result.className = "result danger";

        result.innerHTML =
            "⚠ Malicious / Suspicious URL Detected";

    }

    else{

        result.className = "result safe";

        result.innerHTML =
            "✅ URL Looks Safe";
    }
}

</script>

</body>
</html>
