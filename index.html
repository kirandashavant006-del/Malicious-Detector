<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ThreatGuard AI</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#000;
    color:white;
    min-height:100vh;
    padding:40px;

    background:
    linear-gradient(rgba(0,0,0,0.8),rgba(0,0,0,0.9)),
    url('https://images.unsplash.com/photo-1510511459019-5dda7724fd87?q=80&w=1400');

    background-size:cover;
    background-position:center;
}

.container{
    max-width:900px;
    margin:auto;
}

.title{
    text-align:center;
    margin-bottom:40px;
}

.title h1{
    font-size:70px;
    color:#00d9ff;
}

.title p{
    font-size:22px;
    color:#ddd;
}

.card{
    background:rgba(15,20,30,0.85);
    padding:35px;
    border-radius:20px;
    margin-bottom:30px;
    border:1px solid rgba(255,255,255,0.1);
}

.card h2{
    text-align:center;
    margin-bottom:10px;
    font-size:40px;
}

.card p{
    text-align:center;
    color:#66f2ff;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:18px;
    margin-bottom:20px;
    border:none;
    border-radius:12px;
    background:#111827;
    color:white;
    font-size:16px;
}

button{
    width:100%;
    padding:18px;
    border:none;
    border-radius:12px;
    background:#75ff4d;
    color:black;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#57ff1f;
}

.result{
    display:none;
    margin-top:20px;
    padding:18px;
    border-radius:12px;
    text-align:center;
    font-weight:bold;
    font-size:18px;
}

.safe{
    background:#003d1f;
    color:#63ff9f;
}

.danger{
    background:#4d0000;
    color:#ff5c5c;
}

.warning{
    background:#4d3a00;
    color:#ffd966;
}

footer{
    text-align:center;
    margin-top:30px;
    color:#bbb;
}

</style>
</head>

<body>

<div class="container">

    <div class="title">
        <h1>ThreatGuard AI</h1>
        <p>Smart Detection • Safe Browsing</p>
    </div>

    <!-- URL DETECTION -->

    <div class="card">

        <h2>🔗 URL Threat Detection</h2>

        <p>Detect phishing & fake links</p>

        <input
            type="text"
            id="urlInput"
            placeholder="https://example.com"
        >

        <button onclick="scanURL()">
            Analyze URL
        </button>

        <div id="urlResult" class="result"></div>

    </div>


    <!-- FILE DETECTION -->

    <div class="card">

        <h2>📁 Malicious File Scanner</h2>

        <p>Detect fake PDFs & harmful APK apps</p>

        <input
            type="file"
            id="fileInput"
            accept=".pdf,.txt,.apk,.exe"
        >

        <button onclick="scanFile()">
            Scan File
        </button>

        <div id="fileResult" class="result"></div>

    </div>

    <footer>
        © 2026 ThreatGuard AI
    </footer>

</div>


<script>

const fakeWebsites = [

    "nios-ac.in",
    "old-nios-ac.in",
    "www.nios.gen.in",
    "east.dpsbangalore.edu.in/nios-admissions",
    "nios.ac.in-examresult.in",
    "www.bholananda.org/national_institute_of_open_schooling_nios"

];

const fakeApps = [

    "nios the s g network",
    "nios study material devilsgroup",
    "nios study material hindihelp group",
    "nios books supercop",
    "nios all books mukesh kaushik"

];

function scanURL(){

    let url =
        document.getElementById("urlInput")
        .value
        .trim()
        .toLowerCase();

    let result =
        document.getElementById("urlResult");

    result.style.display = "block";

    if(url === ""){

        result.className =
            "result warning";

        result.innerHTML =
            "⚠ Please enter a URL.";

        return;
    }

    let suspiciousPatterns = [

        "bit.ly",
        "tinyurl",
        "rb.gy",
        "goo.gl",
        "rebrand.ly",
        "t.co",

        "login",
        "verify",
        "secure",
        "bank",
        "paypal",

        "@",
        ".xyz",
        ".ru"

    ];

    for(let fake of fakeWebsites){

        if(url.includes(fake)){

            result.className =
                "result danger";

            result.innerHTML =
                "⚠ Fake Website Detected";

            return;
        }
    }

    let malicious = false;

    for(let pattern of suspiciousPatterns){

        if(url.includes(pattern)){

            malicious = true;
            break;
        }
    }

    if(malicious){

        result.className =
            "result danger";

        result.innerHTML =
            "⚠ Suspicious / Phishing URL Detected";

    }

    else{

        result.className =
            "result safe";

        result.innerHTML =
            "✅ Safe Website<br><br>Opening Website...";

        setTimeout(() => {

            window.open(url, "_blank");

        }, 1500);
    }
}


function scanFile(){

    let fileInput =
        document.getElementById("fileInput");

    let result =
        document.getElementById("fileResult");

    result.style.display = "block";

    if(fileInput.files.length === 0){

        result.className =
            "result warning";

        result.innerHTML =
            "⚠ Please upload a file.";

        return;
    }

    let file =
        fileInput.files[0];

    let fileName =
        file.name.toLowerCase();

    let malicious = false;


    if(
        fileName.includes(".pdf.exe") ||
        fileName.includes(".pdf.js") ||
        fileName.includes(".pdf.apk")
    ){

        malicious = true;
    }

    if(fileName.endsWith(".apk")){

        malicious = true;
    }

    for(let app of fakeApps){

        if(fileName.includes(app)){

            malicious = true;

            result.className =
                "result danger";

            result.innerHTML =
                "⚠ Fake NIOS App Detected";

            return;
        }
    }

    let suspiciousWords = [

        "hack",
        "crack",
        "virus",
        "trojan",
        "malware",
        "keylogger"

    ];

    for(let word of suspiciousWords){

        if(fileName.includes(word)){

            malicious = true;
            break;
        }
    }

    if(malicious){

        result.className =
            "result danger";

        result.innerHTML =
            "⚠ Harmful File / Fake App Detected";

    }

    else{

        result.className =
            "result safe";

        result.innerHTML =
            "✅ File Looks Safe";
    }
}

</script>

</body>
</html>
