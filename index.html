<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ThreatGuard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{

    min-height:100vh;
    background:
    linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)),
    url('hacker.webp');

    background-size:cover;
    background-position:center;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:30px;
    color:white;
}

.container{
    width:100%;
    max-width:850px;
}

.logo{

    text-align:center;
    margin-bottom:35px;
}

.logo h1{

    font-size:80px;
    color:#00cfff;
    text-shadow:0 0 20px #00cfff;
}

.logo p{

    font-size:20px;
    color:white;
    font-weight:bold;
}

.card{

    background:rgba(20,20,30,0.8);
    border:1px solid rgba(0,255,255,0.2);

    backdrop-filter:blur(10px);

    border-radius:25px;

    padding:35px;
    margin-bottom:30px;

    box-shadow:
    0 0 20px rgba(0,255,255,0.1);
}

.card h2{

    text-align:center;
    font-size:45px;
    margin-bottom:10px;
    color:#ffffff;
}

.card p{

    text-align:center;
    color:#00e5ff;
    margin-bottom:25px;
}

input[type="text"]{

    width:100%;
    padding:18px;

    background:#10131d;

    border:2px solid #58f0ff;

    border-radius:15px;

    color:white;
    font-size:17px;

    margin-bottom:20px;

    outline:none;
}

input[type="file"]{

    width:100%;
    padding:18px;

    background:#10131d;

    border:2px solid #58f0ff;

    border-radius:15px;

    color:white;

    margin-bottom:20px;
}

button{

    width:100%;
    padding:18px;

    border:none;
    border-radius:15px;

    background:#7dff4f;

    color:#222;

    font-size:22px;
    font-weight:bold;

    cursor:pointer;

    transition:0.3s;
}

button:hover{

    transform:scale(1.02);

    background:#5cff1a;
}

.result{

    margin-top:20px;

    padding:18px;

    border-radius:15px;

    font-size:20px;
    font-weight:bold;

    text-align:center;

    display:none;
}

.safe{

    background:#003d1f;
    color:#5cff7e;
}

.danger{

    background:#4d0000;
    color:#ff5c5c;
}

.warning{

    background:#4d3b00;
    color:#ffd95c;
}

footer{

    text-align:center;
    color:#aaa;
    margin-top:15px;
}

</style>
</head>
<body>

<div class="container">

    <div class="logo">

        <h1>ThreatGuard</h1>

        <p>
            Smart Detection. Safe Browsing.
        </p>

    </div>

    <!-- FILE DETECTION -->

    <div class="card">

        <h2>Malicious Files</h2>

        <p>Upload PDF/TXT/APK only</p>

        <input
            type="file"
            id="fileInput"
            accept=".pdf,.txt,.apk"
        >

        <button onclick="scanFile()">
            🔍 Analyze
        </button>

        <div id="fileResult" class="result"></div>

    </div>

    <!-- URL DETECTION -->

    <div class="card">

        <h2>URL Threat Detection</h2>

        <p>Enter URL:</p>

        <input
            type="text"
            id="urlInput"
            placeholder="https://example.com"
        >

        <button onclick="scanURL()">
            🛡 Classify
        </button>

        <div id="urlResult" class="result"></div>

    </div>

    <footer>
        © 2026 ThreatGuard | All rights reserved.
    </footer>

</div>

<script>

// URL DETECTION

function scanURL(){

    let url =
        document.getElementById("urlInput")
        .value
        .trim()
        .toLowerCase();

    let result =
        document.getElementById("urlResult");

    result.style.display = "block";

    if(url === ""){

        result.className =
            "result warning";

        result.innerHTML =
            "⚠ Please enter a URL first.";

        return;
    }

    if(
        !url.startsWith("http://") &&
        !url.startsWith("https://")
    ){

        result.className =
            "result warning";

        result.innerHTML =
            "⚠ Invalid URL format.";

        return;
    }

    let suspiciousPatterns = [

        "bit.ly",
        "tinyurl",
        "rb.gy",
        "goo.gl",
        "rebrand.ly",
        "t.co",

        "login",
        "verify",
        "secure",
        "bank",
        "bonus",
        "gift",
        "paypal",
        "free",

        "update-password",
        "confirm-account",

        "@",
        ".xyz",
        ".ru",
        ".top"

    ];

    let malicious = false;

    for(let pattern of suspiciousPatterns){

        if(url.includes(pattern)){

            malicious = true;
            break;
        }
    }

    if(malicious){

        result.className =
            "result danger";

        result.innerHTML =
            "⚠ Malicious / Phishing URL Detected";

    }

    else{

        result.className =
            "result safe";

        result.innerHTML =
            "✅ URL Looks Safe";
    }
}



// FILE DETECTION

function scanFile(){

    let fileInput =
        document.getElementById("fileInput");

    let result =
        document.getElementById("fileResult");

    result.style.display = "block";

    if(fileInput.files.length === 0){

        result.className =
            "result warning";

        result.innerHTML =
            "⚠ Please upload a file.";

        return;
    }

    let file =
        fileInput.files[0];

    let fileName =
        file.name.toLowerCase();

    let suspiciousFileNames = [

        "hack",
        "crack",
        "virus",
        "malware",
        "keylogger",
        "trojan",
        "free-money",
        "mod",
        "premium"

    ];

    let suspiciousExtensions = [

        ".exe",
        ".bat",
        ".scr",
        ".js",
        ".vbs"

    ];

    let malicious = false;

    // Suspicious names
    for(let word of suspiciousFileNames){

        if(fileName.includes(word)){

            malicious = true;
            break;
        }
    }

    // Dangerous extensions
    for(let ext of suspiciousExtensions){

        if(fileName.endsWith(ext)){

            malicious = true;
            break;
        }
    }

    // Fake PDF detection
    if(
        fileName.includes(".pdf.exe") ||
        fileName.includes(".pdf.js")
    ){

        malicious = true;
    }

    // APK warning
    if(fileName.endsWith(".apk")){

        malicious = true;
    }

    if(malicious){

        result.className =
            "result danger";

        result.innerHTML =
            "⚠ Harmful / Fake File Detected";

    }

    else{

        result.className =
            "result safe";

        result.innerHTML =
            "✅ File Looks Safe";
    }
}

</script>

</body>
</html>
