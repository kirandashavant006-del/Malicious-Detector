<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phishing Detector</title>

<style>

body{
    background:black;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:90%;
    max-width:700px;
    background:#111;
    padding:40px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,255,100,0.2);
}

h1{
    text-align:center;
    color:#00ff88;
}

input{
    width:100%;
    padding:15px;
    margin-top:20px;
    border:none;
    border-radius:10px;
    background:#222;
    color:white;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    margin-top:20px;
    border:none;
    border-radius:10px;
    background:#00ff88;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#00cc6a;
}

.result{
    margin-top:25px;
    padding:15px;
    border-radius:10px;
    font-weight:bold;
    text-align:center;
}

.safe{
    background:#003d1f;
    color:#00ff88;
}

.danger{
    background:#4d0000;
    color:#ff4d4d;
}

</style>
</head>
<body>

<div class="container">

    <h1>⚠ Phishing URL Detector</h1>

    <input
        type="text"
        id="urlInput"
        placeholder="Enter suspicious URL..."
    >

    <button onclick="checkURL()">
        Scan URL
    </button>

    <div id="result"></div>

</div>

<script>

function checkURL(){

    let url =
        document.getElementById("urlInput")
        .value
        .toLowerCase();

    let suspiciousWords = [
        "login",
        "verify",
        "secure",
        "bank",
        "free",
        "gift",
        "bonus",
        "bit.ly",
        "tinyurl",
        "rb.gy",
        "goo.gl",
        "rebrand.ly",
        "@",
        "update-password",
        "confirm-account"
    ];

    let result =
        document.getElementById("result");

    let malicious = false;

    for(let word of suspiciousWords){

        if(url.includes(word)){
            malicious = true;
            break;
        }
    }

    if(malicious){

        result.innerHTML =
        "⚠ Malicious / Suspicious URL Detected";

        result.className =
        "result danger";

    }

    else{

        result.innerHTML =
        "✅ URL Looks Safe";

        result.className =
        "result safe";
    }
}

</script>

</body>
</html>
