<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malicious URL & File Detector</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:0;
}

.container{
    max-width:800px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
}

input[type="text"]{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    margin-top:10px;
    padding:12px 20px;
    border:none;
    background:#007bff;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

.result{
    margin-top:15px;
    padding:10px;
    background:#e8f5e9;
    border-left:5px solid green;
}

hr{
    margin:30px 0;
}
</style>
</head>

<body>

<div class="container">

<h1>🔒 Malicious URL & File Detector</h1>

<h2>URL Detection</h2>

<input type="text" id="urlInput" placeholder="Enter URL">
<button onclick="checkURL()">Check URL</button>

<div id="urlResult" class="result" style="display:none;"></div>

<hr>

<h2>File Detection</h2>

<input type="file" id="fileInput">
<button onclick="scanFile()">Scan File</button>

<div id="fileResult" class="result" style="display:none;"></div>

</div>

<script>

function checkURL(){

    let url = document.getElementById("urlInput").value.toLowerCase();

    let suspiciousKeywords = [
        "login",
        "verify",
        "secure",
        "bank",
        "free",
        "bonus",
        "gift",
        "win",
        "prize",
        "claim",
        "password",
        "update",
        "wallet",
        "crypto",
        "lottery",
        "paypal",
        "signin"
    ];

    let suspiciousDomains = [
        ".xyz",
        ".tk",
        ".ru",
        ".cn",
        ".top",
        ".gq"
    ];

    let shorteners = [
        "bit.ly",
        "tinyurl.com",
        "goo.gl",
        "t.co",
        "ow.ly",
        "is.gd"
    ];

    let score = 0;

    suspiciousKeywords.forEach(word=>{
        if(url.includes(word)){
            score++;
        }
    });

    suspiciousDomains.forEach(domain=>{
        if(url.includes(domain)){
            score += 2;
        }
    });

    shorteners.forEach(shortener=>{
        if(url.includes(shortener)){
            score += 3;
        }
    });

    if(url.length > 75){
        score++;
    }

    let result = document.getElementById("urlResult");

    if(score >= 2){
        result.innerHTML = "<b>Result:</b> Malicious URL";
        result.style.background = "#ffebee";
        result.style.borderLeft = "5px solid red";
    }
    else{
        result.innerHTML = "<b>Result:</b> Safe URL";
        result.style.background = "#e8f5e9";
        result.style.borderLeft = "5px solid green";
    }

    result.style.display = "block";
}

function scanFile(){

    let file = document.getElementById("fileInput").files[0];

    if(!file){
        alert("Please select a file");
        return;
    }

    let reader = new FileReader();

    reader.onload = function(e){

        let content = e.target.result.toLowerCase();

        let suspiciousText = [
            "win money",
            "free recharge",
            "claim prize",
            "urgent",
            "lottery",
            "click here",
            "verify account",
            "bank update"
        ];

        let score = 0;

        suspiciousText.forEach(word=>{
            if(content.includes(word)){
                score++;
            }
        });

        let result = document.getElementById("fileResult");

        if(score >= 2){
            result.innerHTML = "<b>Result:</b> Malicious File";
            result.style.background = "#ffebee";
            result.style.borderLeft = "5px solid red";
        }
        else{
            result.innerHTML = "<b>Result:</b> Safe File";
            result.style.background = "#e8f5e9";
            result.style.borderLeft = "5px solid green";
        }

        result.style.display = "block";
    };

    reader.readAsText(file);
}

</script>

</body>
</html>
