<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cyber Shield Detector</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background:#0d0d0d;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:850px;
    background:#161616;
    padding:40px;
    border-radius:20px;
    box-shadow:0 0 30px rgba(0,255,255,0.15);
    border:1px solid #222;
}

h1{
    text-align:center;
    margin-bottom:30px;
    font-size:38px;
    color:#00ffff;
}

.section{
    margin-bottom:40px;
    padding:25px;
    background:#1f1f1f;
    border-radius:15px;
    border:1px solid #2b2b2b;
}

h2{
    margin-bottom:20px;
    color:#00e5ff;
}

input[type="text"]{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#2a2a2a;
    color:white;
    margin-bottom:15px;
    font-size:16px;
}

input[type="file"]{
    margin-bottom:15px;
    color:white;
}

button{
    background:linear-gradient(45deg,#00c6ff,#0072ff);
    color:white;
    border:none;
    padding:14px 22px;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 0 15px rgba(0,200,255,0.5);
}

.result{
    margin-top:20px;
    padding:15px;
    border-radius:10px;
    font-weight:bold;
    animation:fadeIn 0.5s ease;
}

.safe{
    background:#103d1f;
    color:#7CFFB2;
    border-left:5px solid #00ff88;
}

.danger{
    background:#4a1111;
    color:#ff8a8a;
    border-left:5px solid red;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.footer{
    text-align:center;
    margin-top:20px;
    color:#777;
    font-size:14px;
}

</style>
</head>
<body>

<div class="container">

<h1>🛡 Cyber Shield Detector</h1>

<div class="section">

<h2>🔗 URL Detection</h2>

<input type="text" id="urlInput" placeholder="Enter URL Here">

<button onclick="checkURL()">Analyze URL</button>

<div id="urlResult"></div>

</div>

<div class="section">

<h2>📁 File Detection</h2>

<input type="file" id="fileInput">

<br>

<button onclick="scanFile()">Scan File</button>

<div id="fileResult"></div>

</div>

<div class="footer">
Cyber Security Detection System
</div>

</div>

<script>

function checkURL(){

    let userURL = document.getElementById("urlInput").value;

    let suspiciousWords = [
        "login",
        "verify",
        "secure",
        "bank",
        "free",
        "bonus",
        "gift"
    ];

    let result = "Benign";

    for(let word of suspiciousWords){

        if(userURL.toLowerCase().includes(word)){
            result = "Malicious";
            break;
        }
    }

    let output = document.getElementById("urlResult");

    if(result === "Malicious"){

        output.innerHTML =
        `<div class="result danger">
        ⚠ Malicious URL Detected
        </div>`;
    }

    else{

        output.innerHTML =
        `<div class="result safe">
        ✅ Safe URL
        </div>`;
    }
}


function scanFile(){

    let fileInput = document.getElementById("fileInput");

    if(fileInput.files.length === 0){

        document.getElementById("fileResult").innerHTML =
        `<div class="result danger">
        No File Selected
        </div>`;

        return;
    }

    let file = fileInput.files[0];

    let reader = new FileReader();

    reader.onload = function(e){

        let content = e.target.result.toLowerCase();

        let suspiciousText = [
            "win money",
            "free recharge",
            "claim prize",
            "urgent",
            "lottery"
        ];

        let result = "Safe File";

        for(let word of suspiciousText){

            if(content.includes(word)){
                result = "Malicious File";
                break;
            }
        }

        let output = document.getElementById("fileResult");

        if(result === "Malicious File"){

            output.innerHTML =
            `<div class="result danger">
            ⚠ Malicious File Detected
            </div>`;
        }

        else{

            output.innerHTML =
            `<div class="result safe">
            ✅ Safe File
            </div>`;
        }
    };

    reader.readAsText(file);
}

</script>

</body>
</html>
